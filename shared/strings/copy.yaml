# Single source of truth for user-facing copy across all three wInstaller UIs.
#
# Keyed by canonical step id (see docs/screen-inventory.yaml) plus a sub-key.
# Do NOT hardcode user-facing strings per-platform — add/edit them here, then
# regenerate the per-platform outputs:
#   scripts/gen_strings_swift.py   -> apps/macos/.../Localizable.xcstrings
#   scripts/gen_strings_dotnet.py  -> apps/windows/.../Strings.resx
#   scripts/gen_strings_gettext.py -> apps/linux/po/winstaller.pot
#
# CI (strings-sync-check) regenerates all three and fails if committed output
# differs from what this file produces. See docs/adr/0008-feature-parity-enforcement.md.

about:
  tagline: "A calm, native assistant for building bootable Windows and Linux USB installers — on macOS, Windows, and Linux."
  manifesto_excerpt: >-
    wInstaller should feel like something a first-party disk utility would be if
    it actually explained itself. No telemetry, no uploads, no vague "optimizing"
    language — just a local assistant that tells you what it found, what it's
    about to do, and why.


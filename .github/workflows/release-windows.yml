name: Release Windows app

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the built app to"
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test core library
        run: dotnet test apps/windows/WInstaller.Core.Tests/WInstaller.Core.Tests.csproj

      # Unpackaged self-contained publish: runs on a clean Windows 10/11
      # machine with no runtime or Windows App SDK install. The zip is
      # unsigned until code signing is provisioned (ADR-0006 Phase 4 exit
      # criterion); MSIX becomes the primary format once a certificate exists.
      - name: Publish WinUI 3 app (portable, self-contained)
        run: >
          dotnet publish apps/windows/WInstaller.App/WInstaller.App.csproj
          -c Release -r win-x64 -p:Platform=x64
          -p:WindowsAppSDKSelfContained=true --self-contained true
          -o ${{ runner.temp }}/publish

      - name: Zip portable app
        shell: pwsh
        run: >
          Compress-Archive -Path "${{ runner.temp }}/publish/*"
          -DestinationPath "${{ runner.temp }}/wInstaller-Windows-x64.zip"

      - name: Upload asset to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload $tag "${{ runner.temp }}/wInstaller-Windows-x64.zip" --clobber -R "${{ github.repository }}"

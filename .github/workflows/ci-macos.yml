name: macOS

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # The Liquid Glass APIs in Sources/WInstallerApp/DesignSystem/Glass.swift
    # require the macOS 26 SDK (Xcode 26+) to compile, even though their use is
    # gated behind `#available(macOS 26.0, *)` at runtime (see README.md). Use
    # the newest available runner and select the newest installed Xcode rather
    # than pinning a version, since GitHub's Xcode lineup on each image changes
    # over time.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select newest available Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            echo "::error::No /Applications/Xcode_*.app found on this runner."
            exit 1
          fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Swift build
        run: swift build

      - name: Swift test
        run: swift test

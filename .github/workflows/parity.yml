name: Feature parity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  screen-inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check screen parity
        run: python3 scripts/check_screen_parity.py

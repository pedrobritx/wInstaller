name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "docs/site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Remove stale github-pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --paginate \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' |
          while read -r id; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/${id}"
          done
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

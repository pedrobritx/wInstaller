name: Release macOS app

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the built app to"
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    # See ci-macos.yml for why we select the newest available Xcode rather
    # than pinning a version.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Select newest available Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            echo "::error::No /Applications/Xcode_*.app found on this runner."
            exit 1
          fi
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Build wInstaller.app
        run: scripts/build-app.sh "$RUNNER_TEMP/build"

      - name: Zip app bundle
        run: |
          cd "$RUNNER_TEMP/build"
          ditto -c -k --sequesterRsrc --keepParent wInstaller.app wInstaller-macOS.zip

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          gh release upload "$tag" "$RUNNER_TEMP/build/wInstaller-macOS.zip" \
            --clobber -R "${{ github.repository }}"
